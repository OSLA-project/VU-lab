site_name: "Open Source Lab Automation  (OSLA): VU Lab setup"

repo_url: https://github.com/OSLA-project/VU-lab

nav:
  - Home: index.md
  - Components:
      - Overview: components.md
      - Robot Arm: components/robot_arm.md
      - Teleshake 1536: components/teleshake.md
  - Lab Configuration: lab-configuration.md
  - Orchestrator: orchestrator.md
  - About: about.md

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/icon.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom

  features:
    - navigation.footer
  font:
    text: Roboto
    code: Roboto Mono
  locale: en
  highlightjs: true
  color_mode: auto
  user_color_mode_toggle: true
  nav_style: dark
markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [..]
          options:
            show_source: false
            group_by_category: false
            relative_crossrefs: true
  - mkdocs-jupyter:
      execute: false
      ignore_h1_titles: true
      include_source: true
extra:
  version:
    provider: mike
extra_css:
  - stylesheets/extra.css
