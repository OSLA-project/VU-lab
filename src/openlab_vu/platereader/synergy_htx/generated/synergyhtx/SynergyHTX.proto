syntax = "proto3";

import "SiLAFramework.proto";

package sila2.org.silastandard.platereaders.synergyhtx.v1;

/* SiLA server for the Biotek Synergy HTX plate reader. */
service SynergyHTX {
  /* Opens the tray of the plate reader. */
  rpc OpenTray (sila2.org.silastandard.platereaders.synergyhtx.v1.OpenTray_Parameters) returns (sila2.org.silastandard.platereaders.synergyhtx.v1.OpenTray_Responses) {}
  /* Closes the tray of the plate reader. */
  rpc CloseTray (sila2.org.silastandard.platereaders.synergyhtx.v1.CloseTray_Parameters) returns (sila2.org.silastandard.platereaders.synergyhtx.v1.CloseTray_Responses) {}
  /* Read the device temperature. */
  rpc ReadTemperature (sila2.org.silastandard.platereaders.synergyhtx.v1.ReadTemperature_Parameters) returns (sila2.org.silastandard.platereaders.synergyhtx.v1.ReadTemperature_Responses) {}
  /* Read the absorbance for the plate provided. */
  rpc ReadAbsorbance (sila2.org.silastandard.platereaders.synergyhtx.v1.ReadAbsorbance_Parameters) returns (sila2.org.silastandard.platereaders.synergyhtx.v1.ReadAbsorbance_Responses) {}
  /* Returns the serial number of the plate reader. */
  rpc Get_SerialNumber (sila2.org.silastandard.platereaders.synergyhtx.v1.Get_SerialNumber_Parameters) returns (sila2.org.silastandard.platereaders.synergyhtx.v1.Get_SerialNumber_Responses) {}
}

/* Parameters for OpenTray */
message OpenTray_Parameters {
}

/* Responses of OpenTray */
message OpenTray_Responses {
  sila2.org.silastandard.String TrayState = 1;  /* State of the tray after the command. */
}

/* Parameters for CloseTray */
message CloseTray_Parameters {
}

/* Responses of CloseTray */
message CloseTray_Responses {
  sila2.org.silastandard.String TrayState = 1;  /* State of the tray after the command. */
}

/* Parameters for ReadTemperature */
message ReadTemperature_Parameters {
}

/* Responses of ReadTemperature */
message ReadTemperature_Responses {
  sila2.org.silastandard.Real DeviceTemperature = 1;  /* Temperature reported by the device. */
}

/* Parameters for ReadAbsorbance */
message ReadAbsorbance_Parameters {
  sila2.org.silastandard.Integer Plate = 1;  /* Plate parameter. */
  repeated sila2.org.silastandard.Integer Wells = 2;  /* List of wells. */
  sila2.org.silastandard.Integer Wavelength = 3;  /* Wavelength to use for reading the plates. */
}

/* Responses of ReadAbsorbance */
message ReadAbsorbance_Responses {
  message DeviceAbsorbance_Struct {
    sila2.org.silastandard.Integer Wavelength = 1;  /* Wavelength to use for reading the plates. */
    sila2.org.silastandard.Real Temperature = 2;  /* Temperature of the device. */
    sila2.org.silastandard.Timestamp Timestamp = 3;  /* Readout timestamp. */
  }
  sila2.org.silastandard.platereaders.synergyhtx.v1.ReadAbsorbance_Responses.DeviceAbsorbance_Struct DeviceAbsorbance = 1;  /* Absorbance reported by the device. */
}

/* Parameters for SerialNumber */
message Get_SerialNumber_Parameters {
}

/* Responses of SerialNumber */
message Get_SerialNumber_Responses {
  sila2.org.silastandard.String SerialNumber = 1;  /* Returns the serial number of the plate reader. */
}
